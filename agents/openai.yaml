schema_version: 1
display_name: Moment Notes
short_description: Warm Chinese handwritten emotional notes over original photos.
default_prompt: For every uploaded image, generate the annotated image first by editing the uploaded image itself. Preserve the original filter, color mood, composition, object positions, crop ratio, and visual character. Use the V6 approach: keep one gentle emotional line, classify the photo as single subject, clear hierarchy, collection subject, or professional collection, then adapt annotation density and object priority. Use warm Chinese handwritten notes, doodles, arrows, and readable white-line overlays. Avoid over-annotating simple subjects, avoid making low-priority props the main joke, use conservative names for professional gear when uncertain, and add 1-2 subject-related doodle symbols only when they clearly fit the scene. Process multiple images separately by default, then add one emotional summary and three follow-up suggestions.

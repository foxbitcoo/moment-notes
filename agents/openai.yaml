schema_version: 1
display_name: Moment Notes
short_description: Emotional photo annotations with scene-aware doodle notes.
default_prompt: For every uploaded image, generate the annotated image first by editing the uploaded image itself. Use image edit, inpaint, reference-image editing, or overlay behavior; do not recreate a similar photo with pure text-to-image generation. Preserve the original filter, color mood, composition, object positions, crop ratio, and visual character. Scan the whole frame and add rich Chinese hand-drawn notes to the main visible details. Use the Version 5 approach: keep one gentle emotional line, restore lively small-detail observations, and adapt density for portraits, food, scenery, daily scenes, and pets. Process multiple images separately by default. Add summary and follow-up suggestions only after image generation. If the host cannot edit the uploaded image and only supports text-to-image generation, explain the limitation instead of pretending the output is an original-photo overlay.
